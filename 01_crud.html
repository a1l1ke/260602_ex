<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase</title>
  </head>
  <body>
    <form id="join">
      <h1>회원가입</h1>
      <input type="email" name="auth-email" placeholder="123@gmail.com" />
      <input
        type="password"
        name="auth-password"
        placeholder="6자리 이상 비밀번호 입력"
      />
      <button type="submit">가입</button>
    </form>
    <script>
      // https://supabase.com/dashboard/project/본인프로젝트ID
      const SUPABASE_URL = "https://crbjutbtgzgtynuohxpf.supabase.co";
      const SUPABASE_PUB_KEY = "sb_publishable_dnoHoLjHEIEeRkMcDQpIRA_KWhVsD5D";

      // # 안빼먹기
      const joinForm = document.querySelector("#join");
      // submit 안 빼먹고 click이랑 안 헷갈리기
      joinForm.addEventListener("submit", joinHandler);

      async function joinHandler(event) {
        event.preventDefault();
        console.log("joinForm");
        const formData = new FormData(event.target);
        console.log(...formData);
        const email = formData.get("auth-email");
        const password = formData.get("auth-password");
        try {
          const result = await joinWithSupabase(email, password);
          console.log(result);
          console.log("가입 완료");
        } catch (err) {
          console.log("가입 실패");
        }
      }

      async function joinWithSupabase(email, password) {
        // response -> res, resp
        // request -> req
        const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_PUB_KEY,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, password }),
        });
        console.log(res.status);
        console.log(res.ok);
        const json = res.json();
        if (!res.ok) {
          throw new Error(json);
        }
        return json;
      }
    </script>
  </body>
</html>
